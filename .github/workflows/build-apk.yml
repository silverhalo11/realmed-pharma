name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npx vite build
        env:
          VITE_API_URL: https://respectful-dedication-production-15cb.up.railway.app

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealMed-Pharma-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
