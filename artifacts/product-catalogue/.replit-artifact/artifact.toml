kind = "web"
previewPath = "/"
title = "Product Catalogue"
version = "1.0.0"
id = "artifacts/product-catalogue"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24063

[services.development]
run = "pnpm --filter @workspace/product-catalogue run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/product-catalogue", "run", "build" ]
publicDir = "artifacts/product-catalogue/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24063"
BASE_PATH = "/"
